name: Windows EXE Olusturucu

on:
  push:
    branches: [ "main" ] # Main dalına kod attığında otomatik çalışır
  workflow_dispatch:     # GitHub üzerinden manuel tetikleme butonu ekler

jobs:
  build:
    runs-on: windows-latest # İşlemi GitHub'ın Windows bilgisayarında yapar

    steps:
    - name: Kodları Çek
      uses: actions/checkout@v3

    - name: Python Kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # En stabil sürüm

    - name: Gerekli Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller Pillow litemapy

    - name: EXE Olarak Derle (PyInstaller)
      run: |
        pyinstaller --noconsole --onefile --add-data "colors.json;." --add-data "blocks;blocks" mapart.py

    - name: Çıkan EXE Dosyasını İndirmeye Sun
      uses: actions/upload-artifact@v3
      with:
        name: MapArtStudio-Windows-EXE
        path: dist/mapart.exe
